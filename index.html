<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лыско Татьяна — ГЦН</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:#4a4a4a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 0}
.card{width:min(440px,95vw);background:#3d3d3d;text-align:center;opacity:0;animation:rise 0.9s ease 0.2s forwards}
@keyframes rise{to{opacity:1;transform:translateY(0)}from{transform:translateY(20px)}}
.top-bar{background:#565656;padding:20px 32px;display:flex;align-items:center;gap:16px}
.logo-sq img{width:64px;height:64px;object-fit:cover}
.company-name{text-align:left}
.company-name .line1{font-size:13px;font-weight:300;letter-spacing:0.22em;color:#d0cdc8;text-transform:uppercase}
.company-name .line2{font-size:11px;font-weight:200;letter-spacing:0.18em;color:#9a9890;text-transform:uppercase}
.photo-section{padding:32px 32px 0}
.photo-wrap{width:130px;height:130px;border-radius:50%;overflow:hidden;margin:0 auto;border:2px solid #787672}
.photo-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top}
.info{padding:20px 32px 28px}
.name{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:#e8e5e0;letter-spacing:0.05em;margin-bottom:6px}
.role{font-size:9px;font-weight:300;letter-spacing:0.28em;text-transform:uppercase;color:#9a9890;margin-bottom:24px}
.sep{width:40px;height:1px;background:#787672;margin:0 auto 24px}
.contacts{display:flex;flex-direction:column}
.ci{display:flex;align-items:center;gap:14px;padding:12px 0;border-top:1px solid #4d4d4d;text-decoration:none;color:#d0cdc8;transition:color .2s;text-align:left}
.ci:last-child{border-bottom:1px solid #4d4d4d}
.ci:hover{color:#fff}
.ci-icon{width:28px;height:28px;border:1px solid #656360;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci-icon svg{width:12px;height:12px;stroke:#b0ada8;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.lbl{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:#787672;display:block;margin-bottom:1px}
.val{font-size:13px;font-weight:300}
.bottom{background:#333;padding:16px 32px;display:flex;justify-content:center}
.ig-btn{display:flex;align-items:center;gap:8px;text-decoration:none;color:#9a9890;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;font-weight:300;transition:color .2s}
.ig-btn:hover{color:#d0cdc8}
.ig-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
